<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stock Finder</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #f0f2f5; min-height: 100vh; }

  header { background: #1a1a2e; color: #fff; padding: 16px 20px;
           display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; font-weight: 700; }
  .store-dot { width: 10px; height: 10px; border-radius: 50%;
               background: #facc15; flex-shrink: 0; transition: background .4s; }

  .controls { background: #fff; padding: 16px 20px;
              box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  select, input { width: 100%; padding: 11px 14px; border: 1.5px solid #ddd;
                  border-radius: 10px; font-size: 15px; margin-bottom: 10px;
                  appearance: none; background: #fafafa; }
  select:focus, input:focus { outline: none; border-color: #6366f1; background: #fff; }

  .type-tabs { display: flex; gap: 8px; margin-bottom: 10px; }
  .tab { flex: 1; padding: 9px; border: 1.5px solid #ddd; border-radius: 8px;
         background: #fafafa; font-size: 13px; font-weight: 600;
         cursor: pointer; text-align: center; color: #555; transition: all .15s; }
  .tab.active { background: #6366f1; color: #fff; border-color: #6366f1; }

  button.search-btn { width: 100%; padding: 13px; background: #6366f1; color: #fff;
                      border: none; border-radius: 10px; font-size: 16px;
                      font-weight: 700; cursor: pointer; transition: background .15s; }
  button.search-btn:disabled { background: #a5a7f5; cursor: not-allowed; }
  button.search-btn:not(:disabled):active { background: #4f52d9; }

  .loading-banner { background: #fefce8; border: 1px solid #fde047;
                    color: #854d0e; padding: 12px 20px; font-size: 13px;
                    display: flex; align-items: center; gap: 10px; }
  .loading-banner.hidden { display: none; }
  .mini-spin { width: 16px; height: 16px; border: 2px solid #fde047;
               border-top-color: #854d0e; border-radius: 50%;
               animation: spin .7s linear infinite; flex-shrink: 0; }

  .status-bar { padding: 8px 20px; font-size: 12px; color: #888;
                background: #fff; border-top: 1px solid #f0f0f0;
                display: flex; justify-content: space-between; align-items: center; }
  .refresh-btn { font-size: 12px; color: #6366f1; cursor: pointer;
                 background: none; border: none; padding: 4px 8px;
                 border-radius: 6px; font-weight: 600; }
  .refresh-btn:hover { background: #eef2ff; }

  .results { padding: 16px 16px 32px; }
  .section-label { font-size: 12px; font-weight: 700; color: #888;
                   text-transform: uppercase; letter-spacing: .5px; margin: 12px 0 8px; }

  /* Card */
  .card { background: #fff; border-radius: 14px; padding: 14px 16px;
          margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.07);
          cursor: pointer; transition: box-shadow .15s; }
  .card:active { box-shadow: 0 2px 8px rgba(0,0,0,.12); }
  .card.stockout { opacity: .6; }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start;
              gap: 8px; margin-bottom: 6px; }
  .item-name { font-size: 15px; font-weight: 700; color: #1a1a2e; flex: 1; line-height: 1.3; }
  .store-tag { font-size: 11px; font-weight: 700; padding: 3px 8px;
               border-radius: 20px; background: #eef2ff; color: #6366f1; white-space: nowrap; }

  .card-meta { font-size: 12px; color: #888; margin-bottom: 10px; line-height: 1.8; }
  .card-meta span { margin-right: 10px; }

  .stock-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .badge { display: inline-flex; align-items: center; gap: 4px;
           padding: 5px 12px; border-radius: 8px; font-size: 13px; font-weight: 700; }
  .badge.green { background: #dcfce7; color: #16a34a; }
  .badge.red   { background: #fee2e2; color: #dc2626; }
  .sizes-btn { margin-left: auto; font-size: 12px; color: #6366f1; font-weight: 600;
               background: #eef2ff; border: none; padding: 5px 10px;
               border-radius: 8px; cursor: pointer; white-space: nowrap; }

  /* Sizes panel */
  .sizes-panel { margin-top: 12px; border-top: 1px solid #f0f0f0; padding-top: 12px;
                 display: none; }
  .sizes-panel.open { display: block; }
  .sizes-panel-title { font-size: 11px; font-weight: 700; color: #aaa;
                       text-transform: uppercase; letter-spacing: .4px; margin-bottom: 8px; }
  .sizes-loading { text-align: center; padding: 12px; color: #aaa; font-size: 13px; }
  .size-row { display: flex; align-items: center; justify-content: space-between;
              padding: 7px 0; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
  .size-row:last-child { border-bottom: none; }
  .size-label { font-weight: 600; color: #1a1a2e; flex: 1; }
  .size-bc { color: #aaa; font-size: 11px; flex: 1; }
  .size-badges { display: flex; gap: 6px; }
  .size-badge { padding: 3px 8px; border-radius: 6px; font-size: 12px; font-weight: 700; }
  .size-badge.green { background: #dcfce7; color: #16a34a; }
  .size-badge.red   { background: #fee2e2; color: #dc2626; }

  .empty { text-align: center; padding: 48px 20px; color: #aaa; font-size: 15px; }
  .spinner { text-align: center; padding: 40px; }
  .spinner::after { content: ''; display: inline-block; width: 28px; height: 28px;
                    border: 3px solid #eee; border-top-color: #6366f1;
                    border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { background: #fee2e2; color: #dc2626; padding: 12px 16px;
               border-radius: 10px; font-size: 14px; line-height: 1.5; }
</style>
</head>
<body>

<header>
  <div class="store-dot" id="dotEl"></div>
  <h1>Stock Finder</h1>
</header>

<div class="controls">
  <select id="storeSelect">
    <option value="hyderabad">Hyderabad</option>
    <option value="delhi">Delhi</option>
    <option value="pune">Pune</option>
  </select>
  <div class="type-tabs">
    <div class="tab active" data-type="barcode">Barcode</div>
    <div class="tab" data-type="brand">Brand</div>
    <div class="tab" data-type="product">Product</div>
  </div>
  <input type="text" id="queryInput" placeholder="Enter barcode…" autocomplete="off"/>
  <button class="search-btn" id="searchBtn" onclick="doSearch()" disabled>Loading data…</button>
</div>

<div class="loading-banner" id="loadingBanner">
  <div class="mini-spin"></div>
  <span id="loadingText">Loading inventory data from Google Sheets…</span>
</div>

<div class="status-bar">
  <span id="statusText">Connecting…</span>
  <button class="refresh-btn" onclick="forceRefresh()">↺ Refresh</button>
</div>

<div id="results" class="results">
  <div class="empty">Select a store and search above</div>
</div>

<script>
  let selectedType = 'barcode';
  let cacheReady = false;
  let statusPollTimer = null;

  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      selectedType = t.dataset.type;
      const ph = { barcode: 'Enter barcode…', brand: 'Enter brand name…', product: 'Enter product name…' };
      document.getElementById('queryInput').placeholder = ph[selectedType];
    });
  });

  document.getElementById('queryInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && cacheReady) doSearch();
  });

  // ── Status / cache polling ──────────────────────────────────────────────────
  function setReady(counts, lastFetched) {
    cacheReady = true;
    const btn = document.getElementById('searchBtn');
    btn.disabled = false;
    btn.textContent = 'Search';
    document.getElementById('loadingBanner').classList.add('hidden');
    document.getElementById('dotEl').style.background = '#4ade80';
    const total = (counts.hyderabad || 0) + (counts.delhi || 0) + (counts.pune || 0);
    const t = new Date(lastFetched);
    const fmt = t.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })
              + ' ' + t.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
    document.getElementById('statusText').textContent = `${total} items · refreshed ${fmt}`;
  }

  function setLoading(msg) {
    cacheReady = false;
    document.getElementById('searchBtn').disabled = true;
    document.getElementById('searchBtn').textContent = 'Loading data…';
    document.getElementById('loadingBanner').classList.remove('hidden');
    document.getElementById('loadingText').textContent = msg || 'Loading inventory data…';
    document.getElementById('dotEl').style.background = '#facc15';
    document.getElementById('statusText').textContent = 'Loading…';
  }

  function setError(msg) {
    cacheReady = false;
    document.getElementById('searchBtn').disabled = true;
    document.getElementById('searchBtn').textContent = 'Data unavailable';
    document.getElementById('loadingBanner').classList.add('hidden');
    document.getElementById('dotEl').style.background = '#f87171';
    document.getElementById('statusText').textContent = msg || 'Load error — click ↺ Refresh';
  }

  async function checkStatus() {
    try {
      const r = await fetch('/api/status');
      if (!r.ok) { setError('Server error — click ↺ Refresh'); return; }
      const d = await r.json();
      if (d.status === 'ready') {
        setReady(d.counts, d.lastFetched);
        if (statusPollTimer) { clearInterval(statusPollTimer); statusPollTimer = null; }
      } else if (d.status === 'loading') {
        setLoading('Loading inventory from Google Sheets — please wait…');
        if (!statusPollTimer) statusPollTimer = setInterval(checkStatus, 2500);
      } else {
        setError('Failed to load data — click ↺ Refresh');
        if (statusPollTimer) { clearInterval(statusPollTimer); statusPollTimer = null; }
      }
    } catch (e) {
      setError('Cannot reach server');
      setTimeout(checkStatus, 5000);
    }
  }

  async function forceRefresh() {
    setLoading('Refreshing data from Google Sheets…');
    try {
      await fetch('/api/refresh', { method: 'POST' });
      if (!statusPollTimer) statusPollTimer = setInterval(checkStatus, 2500);
    } catch { setError('Refresh request failed'); }
  }

  // ── Search ──────────────────────────────────────────────────────────────────
  async function doSearch() {
    if (!cacheReady) return;
    const q     = document.getElementById('queryInput').value.trim();
    const store = document.getElementById('storeSelect').value;
    if (!q) return;

    const out = document.getElementById('results');
    out.innerHTML = '<div class="spinner"></div>';

    try {
      const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&type=${selectedType}&store=${store}`);
      let data;
      try { data = await res.json(); }
      catch { out.innerHTML = '<div class="error-msg">Unexpected server response. Please try again.</div>'; return; }

      if (!res.ok) {
        out.innerHTML = `<div class="error-msg">${data.error || 'Search failed.'}</div>`;
        if (res.status === 503) { cacheReady = false; checkStatus(); }
        return;
      }
      if (data.total === 0) { out.innerHTML = '<div class="empty">No matching items found</div>'; return; }

      const inStock  = data.primary.filter(r => hasStock(r));
      const outStock = data.primary.filter(r => !hasStock(r));

      let html = '';
      if (inStock.length) {
        html += `<div class="section-label">In Stock (${inStock.length})</div>`;
        html += inStock.map(r => renderCard(r, store)).join('');
      }
      if (outStock.length) {
        html += `<div class="section-label" style="color:#f87171">Out of Stock (${outStock.length})</div>`;
        html += outStock.map(r => renderCard(r, store)).join('');
      }
      out.innerHTML = html;
    } catch (e) {
      out.innerHTML = `<div class="error-msg">Network error: ${e.message}</div>`;
    }
  }

  function hasStock(r) {
    return (parseInt(r.storeStock) || 0) > 0 || (parseInt(r.warehouseStock) || 0) > 0;
  }

  // ── Sizes panel ─────────────────────────────────────────────────────────────
  async function toggleSizes(btn, itemName, van, store) {
    const panel = btn.closest('.card').querySelector('.sizes-panel');
    if (panel.classList.contains('open')) {
      panel.classList.remove('open');
      btn.textContent = '▼ All sizes';
      return;
    }
    panel.classList.add('open');
    btn.textContent = '▲ Hide sizes';

    if (panel.dataset.loaded) return; // already fetched
    panel.innerHTML = '<div class="sizes-panel-title">All Sizes</div><div class="sizes-loading">Loading…</div>';
    panel.classList.add('open');

    try {
      const res = await fetch(`/api/sizes?itemName=${encodeURIComponent(itemName)}&van=${encodeURIComponent(van)}&store=${encodeURIComponent(store)}`);
      const data = await res.json();
      if (!res.ok || !data.sizes) { panel.innerHTML = '<div class="sizes-loading">Could not load sizes.</div>'; return; }

      let html = '<div class="sizes-panel-title">All Sizes</div>';
      if (data.sizes.length === 0) {
        html += '<div class="sizes-loading">No other sizes found.</div>';
      } else {
        data.sizes.forEach(s => {
          const f = parseInt(s.storeStock)  || 0;
          const w = parseInt(s.warehouseStock) || 0;
          html += `
            <div class="size-row">
              <span class="size-label">${s.size || '—'}</span>
              <span class="size-bc">${s.barcode || ''}</span>
              <div class="size-badges">
                <span class="size-badge ${f > 0 ? 'green' : 'red'}">Floor: ${f}</span>
                <span class="size-badge ${w > 0 ? 'green' : 'red'}">WH: ${w}</span>
              </div>
            </div>`;
        });
      }
      panel.innerHTML = html;
      panel.dataset.loaded = '1';
    } catch (e) {
      panel.innerHTML = '<div class="sizes-loading">Error loading sizes.</div>';
    }
  }

  // ── Render card ─────────────────────────────────────────────────────────────
  let cardIdx = 0;
  function renderCard(r, store) {
    const name = r.itemName || r.vendorArticleName || r.barcode || '—';
    const f = parseInt(r.storeStock)     || 0;
    const w = parseInt(r.warehouseStock) || 0;
    const stockout = f === 0 && w === 0;
    const id = 'card-' + (cardIdx++);

    const iname = (r.itemName || '').replace(/'/g, "\\'");
    const van   = (r.vendorArticleName || '').replace(/'/g, "\\'");

    return `
      <div class="card${stockout ? ' stockout' : ''}">
        <div class="card-top">
          <div class="item-name">${name}</div>
          <span class="store-tag">${r.store}</span>
        </div>
        <div class="card-meta">
          ${r.barcode    ? `<span>📦 ${r.barcode}</span>`        : ''}
          ${r.brand      ? `<span>🏷 ${r.brand}</span>`          : ''}
          ${r.size       ? `<span>📐 ${r.size}</span>`           : ''}
          ${r.mrp        ? `<span>₹ MRP ${r.mrp}</span>`         : ''}
          ${r.expiryDate ? `<span>⏳ ${r.expiryDate}</span>`     : ''}
        </div>
        <div class="stock-row">
          <span class="badge ${f > 0 ? 'green' : 'red'}">Floor: ${f}</span>
          <span class="badge ${w > 0 ? 'green' : 'red'}">WH: ${w}</span>
          <button class="sizes-btn" onclick="event.stopPropagation(); toggleSizes(this, '${iname}', '${van}', '${store}')">▼ All sizes</button>
        </div>
        <div class="sizes-panel" id="${id}-sizes"></div>
      </div>`;
  }

  checkStatus();
</script>
</body>
</html>
