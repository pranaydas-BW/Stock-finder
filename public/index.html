<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stock Finder</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #f0f2f5; min-height: 100vh; }

  header { background: #1a1a2e; color: #fff; padding: 16px 20px;
           display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; font-weight: 700; }
  .store-dot { width: 10px; height: 10px; border-radius: 50%;
               background: #facc15; flex-shrink: 0; transition: background .4s; }

  .controls { background: #fff; padding: 16px 20px;
              box-shadow: 0 1px 4px rgba(0,0,0,.08); }

  select, input { width: 100%; padding: 11px 14px; border: 1.5px solid #ddd;
                  border-radius: 10px; font-size: 15px; margin-bottom: 10px;
                  appearance: none; background: #fafafa; }
  select:focus, input:focus { outline: none; border-color: #6366f1; background:#fff; }

  .type-tabs { display: flex; gap: 8px; margin-bottom: 10px; }
  .tab { flex: 1; padding: 9px; border: 1.5px solid #ddd; border-radius: 8px;
         background: #fafafa; font-size: 13px; font-weight: 600;
         cursor: pointer; text-align: center; color: #555; transition: all .15s; }
  .tab.active { background: #6366f1; color: #fff; border-color: #6366f1; }

  button.search-btn { width: 100%; padding: 13px; background: #6366f1; color: #fff;
                      border: none; border-radius: 10px; font-size: 16px;
                      font-weight: 700; cursor: pointer; transition: background .15s; }
  button.search-btn:disabled { background: #a5a7f5; cursor: not-allowed; }
  button.search-btn:not(:disabled):active { background: #4f52d9; }

  .status-bar { padding: 8px 20px; font-size: 12px; color: #888;
                background: #fff; border-top: 1px solid #f0f0f0;
                display: flex; justify-content: space-between; align-items: center; }
  .refresh-btn { font-size: 12px; color: #6366f1; cursor: pointer;
                 background: none; border: none; padding: 4px 8px;
                 border-radius: 6px; font-weight: 600; }
  .refresh-btn:hover { background: #eef2ff; }

  /* Loading banner shown while cache is warming up */
  .loading-banner { background: #fefce8; border: 1px solid #fde047;
                    color: #854d0e; padding: 12px 20px; font-size: 13px;
                    display: flex; align-items: center; gap: 10px; }
  .loading-banner.hidden { display: none; }
  .mini-spin { width: 16px; height: 16px; border: 2px solid #fde047;
               border-top-color: #854d0e; border-radius: 50%;
               animation: spin .7s linear infinite; flex-shrink: 0; }

  .results { padding: 16px 16px 32px; }

  .section-label { font-size: 12px; font-weight: 700; color: #888;
                   text-transform: uppercase; letter-spacing: .5px; margin: 12px 0 8px; }
  .section-label.secondary { color: #aaa; }

  .card { background: #fff; border-radius: 14px; padding: 14px 16px;
          margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  .card.secondary { opacity: .85; border-left: 3px solid #e0e0e0; }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start;
              gap: 8px; margin-bottom: 8px; }
  .item-name { font-size: 15px; font-weight: 700; color: #1a1a2e; flex: 1; }
  .store-tag { font-size: 11px; font-weight: 700; padding: 3px 8px;
               border-radius: 20px; background: #eef2ff; color: #6366f1; white-space: nowrap; }
  .store-tag.secondary { background: #f5f5f5; color: #888; }

  .card-meta { font-size: 12px; color: #888; margin-bottom: 10px; line-height: 1.8; }
  .card-meta span { margin-right: 10px; }

  .stock-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .badge { display: inline-flex; align-items: center; gap: 4px;
           padding: 5px 12px; border-radius: 8px; font-size: 13px; font-weight: 700; }
  .badge.green { background: #dcfce7; color: #16a34a; }
  .badge.red   { background: #fee2e2; color: #dc2626; }

  .empty { text-align: center; padding: 48px 20px; color: #aaa; font-size: 15px; }
  .spinner { text-align: center; padding: 40px; }
  .spinner::after { content: ''; display: inline-block; width: 28px; height: 28px;
                    border: 3px solid #eee; border-top-color: #6366f1;
                    border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg { background: #fee2e2; color: #dc2626; padding: 12px 16px;
               border-radius: 10px; margin: 0; font-size: 14px; line-height: 1.5; }
</style>
</head>
<body>

<header>
  <div class="store-dot" id="dotEl"></div>
  <h1>Stock Finder</h1>
</header>

<div class="controls">
  <select id="storeSelect">
    <option value="hyderabad">Hyderabad</option>
    <option value="delhi">Delhi</option>
    <option value="pune">Pune</option>
  </select>

  <div class="type-tabs">
    <div class="tab active" data-type="barcode">Barcode</div>
    <div class="tab" data-type="brand">Brand</div>
    <div class="tab" data-type="product">Product</div>
  </div>

  <input type="text" id="queryInput" placeholder="Enter barcode…" autocomplete="off"/>
  <button class="search-btn" id="searchBtn" onclick="doSearch()" disabled>Loading data…</button>
</div>

<!-- Shown only while cache is warming up -->
<div class="loading-banner" id="loadingBanner">
  <div class="mini-spin"></div>
  <span id="loadingText">Loading inventory data from Google Sheets — this takes ~10 seconds on first load…</span>
</div>

<div class="status-bar">
  <span id="statusText">Connecting…</span>
  <button class="refresh-btn" onclick="forceRefresh()">↺ Refresh</button>
</div>

<div id="results" class="results">
  <div class="empty">Select a store and search above</div>
</div>

<script>
  let selectedType = 'barcode';
  let cacheReady = false;
  let statusPollTimer = null;

  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      selectedType = t.dataset.type;
      const ph = { barcode: 'Enter barcode…', brand: 'Enter brand name…', product: 'Enter product name…' };
      document.getElementById('queryInput').placeholder = ph[selectedType];
    });
  });

  document.getElementById('queryInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && cacheReady) doSearch();
  });

  function setReady(counts, lastFetched) {
    cacheReady = true;
    const btn = document.getElementById('searchBtn');
    btn.disabled = false;
    btn.textContent = 'Search';
    document.getElementById('loadingBanner').classList.add('hidden');
    document.getElementById('dotEl').style.background = '#4ade80';

    const total = (counts.hyderabad || 0) + (counts.delhi || 0) + (counts.pune || 0);
    const t = new Date(lastFetched);
    const fmt = t.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })
              + ' ' + t.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
    document.getElementById('statusText').textContent = `${total} items loaded · refreshed ${fmt}`;
  }

  function setLoading(msg) {
    cacheReady = false;
    document.getElementById('searchBtn').disabled = true;
    document.getElementById('searchBtn').textContent = 'Loading data…';
    document.getElementById('loadingBanner').classList.remove('hidden');
    document.getElementById('loadingText').textContent = msg || 'Loading inventory data…';
    document.getElementById('dotEl').style.background = '#facc15';
    document.getElementById('statusText').textContent = 'Loading…';
  }

  function setError(msg) {
    cacheReady = false;
    document.getElementById('searchBtn').disabled = true;
    document.getElementById('searchBtn').textContent = 'Data unavailable';
    document.getElementById('loadingBanner').classList.add('hidden');
    document.getElementById('dotEl').style.background = '#f87171';
    document.getElementById('statusText').textContent = msg || 'Load error — click ↺ Refresh';
  }

  async function checkStatus() {
    try {
      const r = await fetch('/api/status');
      if (!r.ok) { setError('Server error — click ↺ Refresh'); return; }
      const d = await r.json();

      if (d.status === 'ready') {
        setReady(d.counts, d.lastFetched);
        if (statusPollTimer) { clearInterval(statusPollTimer); statusPollTimer = null; }
      } else if (d.status === 'loading') {
        setLoading('Loading inventory data from Google Sheets — please wait…');
        if (!statusPollTimer) statusPollTimer = setInterval(checkStatus, 2500);
      } else if (d.status === 'error') {
        setError('Failed to load data — click ↺ Refresh to retry');
        if (statusPollTimer) { clearInterval(statusPollTimer); statusPollTimer = null; }
      } else {
        setLoading('Initialising…');
        if (!statusPollTimer) statusPollTimer = setInterval(checkStatus, 2500);
      }
    } catch (e) {
      setError('Cannot reach server');
      // retry in 5s
      setTimeout(checkStatus, 5000);
    }
  }

  async function forceRefresh() {
    setLoading('Refreshing data from Google Sheets…');
    try {
      await fetch('/api/refresh', { method: 'POST' });
      // Poll until ready
      if (!statusPollTimer) statusPollTimer = setInterval(checkStatus, 2500);
    } catch (e) {
      setError('Refresh request failed');
    }
  }

  async function doSearch() {
    if (!cacheReady) return;
    const q     = document.getElementById('queryInput').value.trim();
    const store = document.getElementById('storeSelect').value;
    if (!q) return;

    const out = document.getElementById('results');
    out.innerHTML = '<div class="spinner"></div>';

    try {
      const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&type=${selectedType}&store=${store}`);
      let data;
      try { data = await res.json(); }
      catch { out.innerHTML = '<div class="results"><div class="error-msg">Server returned an unexpected response. Please try again.</div></div>'; return; }

      if (!res.ok) {
        out.innerHTML = `<div class="results"><div class="error-msg">${data.error || 'Search failed. Please try again.'}</div></div>`;
        // If data not ready, start polling again
        if (res.status === 503) { cacheReady = false; checkStatus(); }
        return;
      }

      if (data.total === 0) {
        out.innerHTML = '<div class="empty">No matching items found</div>';
        return;
      }

      let html = '';
      if (data.primary.length) {
        html += `<div class="section-label">Selected Store (${data.primary[0].store}) — ${data.primary.length} result${data.primary.length !== 1 ? 's' : ''}</div>`;
        html += data.primary.map(r => renderCard(r, false)).join('');
      }
      if (data.secondary.length) {
        html += `<div class="section-label secondary">Other Stores — ${data.secondary.length} result${data.secondary.length !== 1 ? 's' : ''}</div>`;
        html += data.secondary.map(r => renderCard(r, true)).join('');
      }
      out.innerHTML = html;
    } catch (e) {
      out.innerHTML = `<div class="results"><div class="error-msg">Network error: ${e.message}</div></div>`;
    }
  }

  function badge(label, qty) {
    const n = parseInt(qty) || 0;
    return `<span class="badge ${n > 0 ? 'green' : 'red'}">${label}: ${n}</span>`;
  }

  function renderCard(r, secondary) {
    const name = r.itemName || r.vendorArticleName || r.barcode || '—';
    return `
      <div class="card${secondary ? ' secondary' : ''}">
        <div class="card-top">
          <div class="item-name">${name}</div>
          <span class="store-tag${secondary ? ' secondary' : ''}">${r.store}</span>
        </div>
        <div class="card-meta">
          ${r.barcode    ? `<span>📦 ${r.barcode}</span>`         : ''}
          ${r.brand      ? `<span>🏷 ${r.brand}</span>`           : ''}
          ${r.size       ? `<span>📐 ${r.size}</span>`            : ''}
          ${r.mrp        ? `<span>₹ MRP ${r.mrp}</span>`          : ''}
          ${r.expiryDate ? `<span>⏳ Exp: ${r.expiryDate}</span>` : ''}
        </div>
        <div class="stock-row">
          ${badge('Floor', r.storeStock)}
          ${badge('WH', r.warehouseStock)}
        </div>
      </div>`;
  }

  // Kick off
  checkStatus();
</script>
</body>
</html>
